services:
  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    environment:
      - PROXY_PORT=8080
      - ANTHROPIC_BASE_URL=https://api.anthropic.com
      - DATA_DIR=/data
      - LOG_LEVEL=info
    volumes:
      - ./data:/data

  api:
    build: ./api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATA_DIR=/data
      - DB_PATH=/data/costtrack.db
    volumes:
      - ./data:/data
    depends_on:
      - proxy

  collector:
    build: ./collector
    environment:
      - DATA_DIR=/data
      - ENABLE_AWS_COSTS=false
      - ENABLE_OPENCOST=false
      - ENABLE_GPU_METRICS=false
    volumes:
      - ./data:/data
    depends_on:
      - api

  dashboard:
    build: ./dashboard
    ports:
      - "5173:4173"
    depends_on:
      - api
